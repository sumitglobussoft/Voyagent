name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests (pytest)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: uv sync (voyagent-api)
        run: uv sync --package voyagent-api

      # NOTE: test_runtime_unavailable_returns_503 is a known pre-existing
      # failure in tests/api/test_chat.py and is deselected here. See docs/CI.md.
      - name: Pytest
        run: |
          uv run pytest tests/ \
            --ignore=tests/e2e \
            -q \
            --deselect tests/api/test_chat.py::test_runtime_unavailable_returns_503

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: uv sync
        run: uv sync --package voyagent-api

      - name: Ruff
        run: uv run ruff check .

      # Mypy is informational for now — do not block CI on it until the
      # codebase is fully typed. Flip continue-on-error to false when ready.
      - name: Mypy (services/api, services/agent_runtime)
        continue-on-error: true
        run: |
          uv run mypy \
            --ignore-missing-imports \
            services/api/src services/agent_runtime/src

  ts-type-check:
    name: TypeScript type-check
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      # Packages must build first — apps import from their dist/.
      - name: Build workspace packages
        run: pnpm -r --filter "./packages/*" build

      - name: tsc --noEmit (web)
        run: pnpm --filter @voyagent/web exec tsc --noEmit

      - name: tsc --noEmit (marketing)
        continue-on-error: true
        run: pnpm --filter @voyagent/marketing exec tsc --noEmit

  vitest:
    name: Vitest (chat + sdk)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r --filter "./packages/*" build

      - name: Vitest — chat
        run: pnpm --filter @voyagent/chat exec vitest run

      - name: Vitest — sdk
        run: pnpm --filter @voyagent/sdk exec vitest run

  playwright:
    name: Playwright (live site smoke)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r --filter "./packages/*" build

      - name: Install Playwright browsers
        run: pnpm --filter @voyagent/tests-e2e exec playwright install --with-deps chromium

      - name: Playwright test (live)
        env:
          VOYAGENT_BASE_URL: https://voyagent.globusdemos.com
        run: pnpm --filter @voyagent/tests-e2e exec playwright test --reporter=line

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7

  marketing-build:
    name: Marketing Next build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r --filter "./packages/*" build

      - name: Build marketing
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: pnpm --filter @voyagent/marketing build
