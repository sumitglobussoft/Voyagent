name: Desktop Release

# Desktop (Tauri) release pipeline.
#
# Triggers:
#   - GitHub Release published  -> full matrix build + attach artifacts to the release.
#   - workflow_dispatch         -> manual build, artifacts uploaded as workflow artifacts.
#   - pull_request              -> dry-run job (build only, no publish, no uploads to the release).
#
# Signing is INTENTIONALLY disabled for v0. Binaries produced by this
# workflow are UNSIGNED:
#   - macOS: will show "unidentified developer" Gatekeeper warning; user
#     must right-click > Open. Notarization is not performed.
#   - Windows: will show SmartScreen "unknown publisher" warning. The
#     .msi / .exe still install.
#   - Linux: AppImage / .deb do not need signing; optional GPG for apt repos.
#
# To enable production signing, the repo owner must set the following
# GitHub Actions secrets and uncomment the env block below:
#
#   macOS   : APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
#             APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
#   Windows : WINDOWS_CERTIFICATE (base64 PFX), WINDOWS_CERTIFICATE_PASSWORD
#   Tauri updater : TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#
# See apps/desktop/README.md for the full walkthrough.

on:
  release:
    types: [published]
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-release.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-release:
    # Full release build + artifact publish. Skipped on pull_request
    # (the dry-run job below covers PRs).
    if: github.event_name != 'pull_request'
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            tauri-args: "--target universal-apple-darwin"
          - os: ubuntu-22.04
            rust-targets: ""
            tauri-args: ""
          - os: windows-2022
            rust-targets: ""
            tauri-args: ""

    # Uncomment once signing secrets are configured. See header comment.
    # env:
    #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
    #   APPLE_ID: ${{ secrets.APPLE_ID }}
    #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
    #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    #   WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
    #   WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    #   TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm 10
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: pnpm install
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r --filter "./packages/*" build

      - name: Tauri build
        run: pnpm --filter @voyagent/desktop tauri build ${{ matrix.tauri-args }}

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: voyagent-desktop-macos
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: voyagent-desktop-linux
          path: |
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-2022'
        uses: actions/upload-artifact@v4
        with:
          name: voyagent-desktop-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Attach artifacts to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          fail_on_unmatched_files: false

  desktop-release-dry-run:
    # CI validation for pull requests that touch desktop code.
    # Builds the Tauri binary for the current runner only — does NOT
    # publish, upload to the release, or attempt signing. Success here
    # means the release matrix is unlikely to break on merge.
    if: github.event_name == 'pull_request'
    name: Dry-run ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-22.04, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm 10
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: pnpm install
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r --filter "./packages/*" build

      - name: Tauri build (dry-run, no publish)
        run: pnpm --filter @voyagent/desktop tauri build
