# =============================================================================
# staging.voyagent.globusdemos.com  —  HOST-LEVEL nginx vhost (staging)
#
# Mirrors the prod vhost shape but points at the staging upstream ports
# (offset from prod by +10):
#   api        8010 -> 8020
#   web        3011 -> 3021
#   marketing  3012 -> 3022
#
# Before certbot runs this file is HTTP-only and serves the ACME challenge.
# After certbot runs it will inject the managed listen-443 block just like
# the prod vhost. Do NOT copy the certbot-managed lines from prod into this
# template by hand — let certbot do it.
# =============================================================================

upstream voyagent_api_staging_u       { server 127.0.0.1:8020; keepalive 64; }
upstream voyagent_web_staging_u       { server 127.0.0.1:3021; keepalive 32; }
upstream voyagent_marketing_staging_u { server 127.0.0.1:3022; keepalive 32; }

server {
    listen 80;
    listen [::]:80;
    server_name staging.voyagent.globusdemos.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        allow all;
    }

    client_max_body_size 20m;
    server_tokens off;

    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag            "noindex, nofollow" always;

    location = /health {
        proxy_pass http://voyagent_api_staging_u/health;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        access_log off;
    }

    location = /api/contact {
        proxy_pass http://voyagent_marketing_staging_u;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 30s;
    }

    location = /api { return 308 /api/; }
    location /api/ {
        proxy_pass http://voyagent_api_staging_u/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $http_connection;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
    }

    location = /app {
        proxy_pass http://voyagent_web_staging_u;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $http_connection;
        proxy_read_timeout 60s;
    }

    location /app/ {
        proxy_pass http://voyagent_web_staging_u;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $http_connection;
        proxy_read_timeout 60s;
    }

    location /_next/ {
        proxy_pass http://voyagent_marketing_staging_u;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_cache_valid 200 302 1h;
    }

    location / {
        proxy_pass http://voyagent_marketing_staging_u;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $http_connection;
        proxy_read_timeout 60s;
    }
}
