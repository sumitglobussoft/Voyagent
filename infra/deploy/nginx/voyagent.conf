# Voyagent inner-edge nginx.
#
# Mounted read-only at /etc/nginx/conf.d/default.conf. Exposes port 80
# inside the Docker network; the host nginx (outer edge) terminates TLS
# and reverse-proxies to this on the voyagent_net bridge via the single
# published port VOYAGENT_EDGE_PORT.
#
# Routing:
#   /            -> marketing:3000
#   /app, /app/* -> web:3001  (path preserved)
#   /api, /api/* -> api:8000  (path preserved; SSE-friendly)
#   /health      -> api:8000/health
#
# TLS + HSTS live on the outer edge (nginx-host/voyagent.globusdemos.com.conf).

upstream voyagent_marketing { server marketing:3000; keepalive 32; }
upstream voyagent_web       { server web:3001;       keepalive 32; }
upstream voyagent_api       { server api:8000;       keepalive 64; }

# gzip is handy for JSON + HTML; leave binary paths untouched.
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.api+json
    application/xml
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;
gzip_vary on;

# Log format with upstream timing for debuggability.
log_format voyagent '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'upstream=$upstream_addr rt=$request_time urt=$upstream_response_time';
access_log /var/log/nginx/access.log voyagent;

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 20m;
    server_tokens off;

    # --- Security headers (outer edge owns HSTS + TLS) -------------
    add_header X-Content-Type-Options        "nosniff"                     always;
    add_header X-Frame-Options               "DENY"                        always;
    add_header Referrer-Policy               "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy       "default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data: blob:; font-src 'self' https: data:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
    add_header Permissions-Policy            "camera=(), microphone=(), geolocation=()" always;

    # Shared proxy knobs.
    proxy_http_version 1.1;
    proxy_set_header Host                $host;
    proxy_set_header X-Real-IP           $remote_addr;
    proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto   $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host    $host;
    proxy_set_header Connection          "";

    # --- /health passthrough ---------------------------------------
    # Lets the outer edge (and uptime probes) hit the API liveness
    # endpoint without special routing.
    location = /health {
        proxy_pass http://voyagent_api/health;
        access_log off;
    }

    # --- /api/contact -> marketing Next.js route handler -----------
    # The marketing site owns its own /api/contact route. It sits in
    # apps/marketing/app/api/contact/route.ts and must not be shadowed
    # by the broader /api/ -> FastAPI rule below. Declared first (and
    # with `= /api/contact` exact-match) so nginx prefers it regardless
    # of location-order subtleties.
    location = /api/contact {
        proxy_pass http://voyagent_marketing;
        proxy_read_timeout 30s;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $http_connection;
    }

    # --- /api/* -> FastAPI -----------------------------------------
    # Long timeouts for long-poll and tool calls. SSE buffering
    # disabled globally on /api/ so *all* streaming endpoints work
    # without us having to enumerate them.
    location /api/ {
        proxy_pass http://voyagent_api/;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;
        # Preserve SSE chunked transfer.
        chunked_transfer_encoding on;
    }

    # Bare /api -> /api/
    location = /api {
        return 308 /api/;
    }

    # --- /app/* -> authenticated web -------------------------------
    # The authenticated Next.js app (apps/web) configures basePath=/app
    # so it emits its own routes AND its static assets under /app/_next/*.
    # Marketing keeps the top-level /_next/* (its own assets).
    #
    # NOTE: nginx inheritance — defining ANY proxy_set_header inside a
    # location block discards every proxy_set_header from the parent
    # server block. So we re-declare the full set inside each location
    # that needs upgrade/connection forwarding, or Next.js Server Actions
    # reject the request as cross-origin (Host header would otherwise be
    # the upstream name, not voyagent.globusdemos.com).
    location /app/ {
        proxy_pass http://voyagent_web;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $http_connection;
    }

    # Bare /app MUST proxy to the web upstream, not 308 -> /app/.
    # Next.js (with basePath=/app and the default trailingSlash=false)
    # normalizes /app/ -> /app at the app-router layer. If nginx also
    # 308's /app -> /app/ we get a redirect loop:
    #   /app  --nginx 308--> /app/  --next 308--> /app  --loop--
    # Proxying /app straight through lets Next render app/page.tsx
    # which redirect()s to /app/chat in one hop.
    location = /app {
        proxy_pass http://voyagent_web;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $http_connection;
    }

    # Marketing's Next.js static bundle (CSS, JS chunks, fonts, media).
    # Long cache-control because the filenames are content-hashed.
    location /_next/ {
        proxy_pass http://voyagent_marketing;
        proxy_cache_valid 200 302 1h;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $http_connection;
    }

    # --- Everything else -> marketing ------------------------------
    location / {
        proxy_pass http://voyagent_marketing;
        proxy_read_timeout 60s;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $http_connection;
    }
}
