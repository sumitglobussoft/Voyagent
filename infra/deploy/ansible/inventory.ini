; Voyagent single-host inventory.
;
; Run plays with:
;   ansible-playbook -i inventory.ini playbook.yml --ask-pass --ask-become-pass
;
; Or, if you have key-based auth wired up:
;   ansible-playbook -i inventory.ini playbook.yml

[voyagent]
voyagent.globusdemos.com ansible_host=163.227.174.141

[voyagent:vars]
ansible_user=empcloud-development
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new
