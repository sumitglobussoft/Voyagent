# =============================================================================
# voyagent.globusdemos.com  —  HOST-LEVEL nginx vhost (NATIVE deployment)
#
# This is the source of truth for the live deployment. Mirrored to
# /etc/nginx/sites-available/voyagent.globusdemos.com on the prod host
# during deploy. Generated 2026-04-14, updated 2026-04-15 with:
#   - /app bare route now proxies (was 308 /app/, looped against Next 15
#     basePath trailingSlash normalization)
#   - /api/contact carved out so the marketing Next.js handler isn't
#     shadowed by the broader /api/ -> FastAPI rule
# =============================================================================

upstream voyagent_api_u       { server 127.0.0.1:8010; keepalive 64; }
upstream voyagent_web_u       { server 127.0.0.1:3011; keepalive 32; }
upstream voyagent_marketing_u { server 127.0.0.1:3012; keepalive 32; }

server {
    server_name voyagent.globusdemos.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        allow all;
    }

    client_max_body_size 20m;
    server_tokens off;

    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    location = /health {
        proxy_pass http://voyagent_api_u/health;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        access_log off;
    }

    # /api/contact lives in the marketing Next.js app, not FastAPI.
    # Declared BEFORE the generic /api/ rule so nginx's longest-match
    # exact-prefix rule routes correctly.
    location = /api/contact {
        proxy_pass http://voyagent_marketing_u;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 30s;
    }

    location = /api { return 308 /api/; }
    location /api/ {
        proxy_pass http://voyagent_api_u/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $http_connection;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
    }

    # Bare /app proxies straight to the web app — Next 15 with basePath=/app
    # serves the root at /app and self-redirects to /app/chat. Issuing a
    # 308 to /app/ here would trip Next's trailingSlash:false normalizer
    # (which 308's /app/ -> /app), creating an infinite loop.
    location = /app {
        proxy_pass http://voyagent_web_u;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $http_connection;
        proxy_read_timeout 60s;
    }

    location /app/ {
        proxy_pass http://voyagent_web_u;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $http_connection;
        proxy_read_timeout 60s;
    }

    location /_next/ {
        proxy_pass http://voyagent_marketing_u;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_cache_valid 200 302 1h;
    }

    location / {
        proxy_pass http://voyagent_marketing_u;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $http_connection;
        proxy_read_timeout 60s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl;                  # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/voyagent.globusdemos.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/voyagent.globusdemos.com/privkey.pem;   # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                                  # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                                    # managed by Certbot
}

server {
    if ($host = voyagent.globusdemos.com) { return 301 https://$host$request_uri; }
    listen 80;
    listen [::]:80;
    server_name voyagent.globusdemos.com;
    return 404;
}

# Internal HTTP listener for web's server-side fetches.
server {
    listen 127.0.0.1:8081;
    server_name _;
    access_log off;
    location /api/ {
        proxy_pass http://voyagent_api_u/;
        proxy_http_version 1.1;
        proxy_set_header Host              voyagent.globusdemos.com;
        proxy_set_header X-Forwarded-Host  voyagent.globusdemos.com;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }
}
