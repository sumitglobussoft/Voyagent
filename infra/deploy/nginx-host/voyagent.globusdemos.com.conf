# =============================================================================
# voyagent.globusdemos.com  —  HOST-LEVEL nginx vhost
#
# How to install:
#   1. sudo cp voyagent.globusdemos.com.conf /etc/nginx/sites-available/
#   2. sudo ln -sf /etc/nginx/sites-available/voyagent.globusdemos.com.conf \
#                  /etc/nginx/sites-enabled/voyagent.globusdemos.com.conf
#   3. sudo nginx -t
#   4. sudo systemctl reload nginx
#
# TLS: certbot on this host already manages certificates for
#      *.globusdemos.com (or at minimum voyagent.globusdemos.com).
#      Adjust `ssl_certificate` + `ssl_certificate_key` to the actual
#      paths if they differ from the defaults below.
#
# This file is a pure reverse proxy to the compose stack's inner nginx
# listening on 127.0.0.1:${VOYAGENT_EDGE_PORT} (default 8480). Nothing
# in the compose stack is exposed on any other host port.
# =============================================================================

# Tune this to match your compose .env.prod.
#   VOYAGENT_EDGE_PORT=8480
# Hard-coded here because nginx does not read host env vars at runtime.
upstream voyagent_edge {
    server 127.0.0.1:8480;
    keepalive 64;
}

# ----- HTTP -> HTTPS redirect ------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name voyagent.globusdemos.com;

    # Keep ACME HTTP-01 challenges reachable if certbot uses webroot.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

# ----- HTTPS -----------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name voyagent.globusdemos.com;

    # --- TLS (certbot-managed) ---
    ssl_certificate     /etc/letsencrypt/live/voyagent.globusdemos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voyagent.globusdemos.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS — outer edge owns this, not the inner nginx.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Upload ceiling for document workflows.
    client_max_body_size 20m;

    # Shared proxy knobs used by every location below.
    proxy_http_version 1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  https;
    proxy_set_header X-Forwarded-Host   $host;

    # SSE-safe proxying for /api/chat/sessions/<id>/messages and any
    # other streaming endpoint on /api/. Turning buffering off at the
    # outer edge is required — the inner nginx already does the same.
    location /api/ {
        proxy_pass http://voyagent_edge;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;
        chunked_transfer_encoding on;
    }

    # Authenticated app + everything else falls through to the inner
    # nginx which handles /app/*, /_next/*, and / (marketing).
    location / {
        proxy_pass http://voyagent_edge;
        proxy_read_timeout 60s;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;
    }

    # Dedicated /health path for uptime probes — doesn't log.
    location = /health {
        proxy_pass http://voyagent_edge/health;
        access_log off;
    }
}
