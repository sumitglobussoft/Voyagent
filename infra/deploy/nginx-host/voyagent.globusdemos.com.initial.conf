# =============================================================================
# voyagent.globusdemos.com  —  initial HTTP-only vhost, pre-certbot
#
# This file is installed BEFORE the first run of `certbot --nginx -d
# voyagent.globusdemos.com`. Certbot will mutate it to add the 443 server
# block and the HTTP->HTTPS redirect. After certbot succeeds, replace this
# with `voyagent.globusdemos.com.conf` (the full production config) if you
# want stricter TLS / SSE knobs on the 443 block.
# =============================================================================

upstream voyagent_edge {
    server 127.0.0.1:8480;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name voyagent.globusdemos.com;

    # ACME HTTP-01 challenge — certbot --nginx needs this reachable.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        allow all;
    }

    # Upload ceiling for document workflows.
    client_max_body_size 20m;

    # Shared proxy knobs.
    proxy_http_version 1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Host   $host;

    # SSE-safe proxying for /api/chat/sessions/<id>/messages.
    location /api/ {
        proxy_pass http://voyagent_edge;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://voyagent_edge;
        proxy_read_timeout 60s;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;
    }

    location = /health {
        proxy_pass http://voyagent_edge/health;
        access_log off;
    }
}
