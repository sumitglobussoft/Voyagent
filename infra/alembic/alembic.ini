; Alembic configuration for the Voyagent storage schema.
;
; sqlalchemy.url is intentionally blank — the real URL comes from the
; ``VOYAGENT_DB_URL`` environment variable and is wired in env.py. Using
; a literal URL here would leak credentials into version control and
; force every developer to patch the file before running migrations.
;
; Run:
;   uv run alembic -c infra/alembic/alembic.ini upgrade head

[alembic]
script_location = infra/alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
